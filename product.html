<!DOCTYPE html>
<html>
<head>
<title>Product Detail - TrendyGadget Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
	<h1><a href="index.html" style="color:white;text-decoration:none;">TrendyGadget Store</a></h1>
	<p style="color:white;">Best gadgets shipped to your door!</p>
	<a href="checkout.html" class="cart-link">Cart (<span id="cart-count">0</span>)</a>
</div>

<div class="container">
	<a href="index.html">&laquo; Back to products</a>

	<div id="detail" class="detail">
	</div>
</div>

<script src="products.js"></script>
<script>
function getId() {
	var url = window.location.search;
	var parts = url.replace("?", "").split("=");
	return parseInt(parts[1]);
}

function showProduct() {
	var id = getId();
	var found = null;
	for (var i = 0; i < products.length; i++) {
		if (products[i].id == id) {
			found = products[i];
		}
	}

	var detail = document.getElementById("detail");
	if (found == null) {
		detail.innerHTML = "<p>Product not found!</p>";
		return;
	}

	detail.innerHTML = '<div class="detail-img"></div>' +
		'<div class="detail-info">' +
		'<h2>' + found.name + '</h2>' +
		'<p class="price">$' + found.price + '</p>' +
		'<p>Category: ' + found.category + '</p>' +
		'<p>This is a great ' + found.name + '. Limited stock available, order now! Free shipping worldwide.</p>' +
		'</div>';
}

window.onload = function() {
	showProduct();
};
</script>
</body>
</html>
