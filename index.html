<!DOCTYPE html>
<html>
<head>
<title>TrendyGadget Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
	<h1>TrendyGadget Store</h1>
	<p style="color:white;">Best gadgets shipped to your door!</p>
	<a href="checkout.html" class="cart-link">Cart (<span id="cart-count">0</span>)</a>
</div>

<div class="container">
	<h2>Featured Products</h2>
	<p>Welcome to our store. Check out our amazing products below!</p>

	<div class="categories">
		<button onclick="filterCategory('All')">All</button>
		<button onclick="filterCategory('Gadgets')">Gadgets</button>
		<button onclick="filterCategory('Home')">Home</button>
		<button onclick="filterCategory('Fitness')">Fitness</button>
	</div>

	<div class="product-grid" id="product-grid">
		<!-- products rendered by products.js -->
	</div>
</div>

<script src="products.js"></script>
<script src="cart.js"></script>
</body>
</html>
