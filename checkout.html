<!DOCTYPE html>
<html>
<head>
<title>Checkout - TrendyGadget Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
	<h1><a href="index.html" style="color:white;text-decoration:none;">TrendyGadget Store</a></h1>
	<p style="color:white;">Best gadgets shipped to your door!</p>
	<a href="checkout.html" class="cart-link">Cart (<span id="cart-count">0</span>)</a>
</div>

<div class="container">
	<a href="index.html">&laquo; Continue shopping</a>

	<h2>Your Cart</h2>
	<div id="cart-list"></div>
	<h3 id="cart-total"></h3>

	<h2>Checkout</h2>
	<form id="checkout-form" onsubmit="placeOrder(); return false;">
		<p>
			<label>Full Name:</label><br>
			<input type="text" name="name" required>
		</p>
		<p>
			<label>Email:</label><br>
			<input type="text" name="email" required>
		</p>
		<p>
			<label>Address:</label><br>
			<input type="text" name="address" required>
		</p>
		<p>
			<label>City:</label><br>
			<input type="text" name="city" required>
		</p>
		<p>
			<label>Card Number:</label><br>
			<input type="text" name="card" required>
		</p>
		<button type="submit">Place Order</button>
	</form>
</div>

<div class="footer">
	<p>Copyright 2021 TrendyGadget Store</p>
</div>

<script src="products.js"></script>
<script src="cart.js"></script>
<script>
window.onload = function() {
	renderCart();
	updateBadge();
};
</script>
</body>
</html>
